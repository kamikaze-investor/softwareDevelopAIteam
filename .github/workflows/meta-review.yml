name: Meta Review (Gemini)

# PRがmainにマージされる前に必ず実行する
# blocked → CI失敗 → マージ不可（Branch Protection で Required に設定すること）
on:
  pull_request:
    branches: [master, main]   # master（現在）と main（将来の改名）の両方に対応

permissions:
  pull-requests: write   # PRへのコメント投稿
  contents: read

jobs:
  meta-review:
    name: Meta Reviewer AI (Gemini)
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # 1. チェックアウト（全履歴取得 = diffのため）
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------
      # 2. Node.js + pnpm のセットアップ
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -------------------------------------------------------
      # 3. Meta Review 実行（Gemini に diff を渡す）
      # -------------------------------------------------------
      - name: Run Meta Review
        id: meta-review
        run: pnpm --filter @ai-team/worker tsx src/metaReviewer/autoReview.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BASE_SHA:  ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:  ${{ github.event.pull_request.head.sha }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          TASK_ID:   "pr-${{ github.event.pull_request.number }}"

      # -------------------------------------------------------
      # 4. 結果をPRにコメント投稿（always = blocked時も投稿）
      # -------------------------------------------------------
      - name: Post Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')

            // autoReview.ts が meta-review-result.json を書き出す
            let result
            try {
              result = JSON.parse(fs.readFileSync('meta-review-result.json', 'utf-8'))
            } catch {
              // ファイルが存在しない = 実行前にエラーで落ちた
              result = {
                status: 'blocked',
                riskLevel: 'critical',
                summary: 'Meta Review の実行自体に失敗しました。ログを確認してください。',
                findings: [],
                requiresCeoApproval: true,
              }
            }

            const statusEmoji = {
              approved:           '✅',
              changes_requested:  '⚠️',
              blocked:            '🚫',
            }
            const emoji = statusEmoji[result.status] ?? '❓'

            const findingsSection = result.findings.length > 0
              ? [
                  '',
                  '### 検出事項',
                  ...result.findings.map(f => {
                    const lines = [`- **[${f.severity}]** ${f.message}`]
                    if (f.suggestion) lines.push(`  > 💡 ${f.suggestion}`)
                    return lines.join('\n')
                  }),
                ].join('\n')
              : '\n*検出事項なし*'

            const ceoNote = result.requiresCeoApproval
              ? '\n\n> 🔴 **CEO承認が必要です。** このPRはマージ不可です。'
              : ''

            const body = [
              `## ${emoji} Meta Review — ${result.status.toUpperCase()}`,
              '',
              `| 項目 | 内容 |`,
              `|---|---|`,
              `| 判定 | **${result.status}** |`,
              `| リスク | ${result.riskLevel} |`,
              `| 対象エリア | ${result.targetArea ?? '—'} |`,
              '',
              `### サマリー`,
              result.summary,
              findingsSection,
              ceoNote,
              '',
              `---`,
              `*Reviewed by Gemini (Meta Reviewer AI) — [ログを確認](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
            ].join('\n')

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            })
